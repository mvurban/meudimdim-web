services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: meudimdim_web
    volumes:
      - ..:/app
      - /app/web/node_modules
    working_dir: /app/web
    command: sleep infinity
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development